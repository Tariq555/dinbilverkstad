name: Build Windows Installer (x64)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Build backend (PyInstaller)
        working-directory: dinbilverkstad
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force venv_ci -ErrorAction SilentlyContinue
          python -m venv venv_ci
          .\venv_ci\Scripts\python.exe -m pip install --upgrade pip setuptools wheel
          .\venv_ci\Scripts\python.exe -m pip install -r requirements.txt
          .\venv_ci\Scripts\python.exe -m pip install pyinstaller
          .\venv_ci\Scripts\python.exe -m PyInstaller --noconfirm --clean --onefile --name DinBilverkstad --add-data "templates;templates" --add-data "static;static" app.py
          New-Item -ItemType Directory -Force -Path .\release\DinBilverkstad\data | Out-Null
          Copy-Item -Force .\dist\DinBilverkstad.exe .\release\DinBilverkstad\DinBilverkstad.exe
          if (Test-Path .\install_windows.bat) { Copy-Item -Force .\install_windows.bat .\release\DinBilverkstad\Install_DinBilverkstad.bat }

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Build desktop installer (Electron/NSIS x64)
        shell: cmd
        run: |
          cd electron
          npm install
          npm run build:win

      - name: List build output
        shell: cmd
        run: |
          dir electron\dist
          dir electron\dist\*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DinBilverkstad-Installer-x64
          path: |
            electron/dist/**
          if-no-files-found: error
